name: Hourly PricesAPI Fetch

on:
  # schedule:
  #   - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run fetch and publish
        env:
          PRICES_API_KEY: ${{ secrets.PRICES_API_KEY }}
          EVENTHUB_CONNECTION_STRING: ${{ secrets.EVENTHUB_CONNECTION_STRING }}
          EVENTHUB_NAME: "competition-prices"
          SEARCH_QUERY: ""
          SEARCH_PRODUCT_LIMIT: "10"
          TARGET_PRODUCT_IDS: "3669,3671,3673"
          TARGET_COUNTRY: "au"
          TOP_OFFERS_LIMIT: "10"
        run: python src/fetch_and_publish.py
